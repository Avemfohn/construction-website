# Full-stack dev stack: PostgreSQL, Django (DRF), Next.js, and Dev Container workspace.
# Run from repo root: docker compose up -d
# Open in VS Code / Cursor: "Reopen in Container" (uses .devcontainer/devcontainer.json).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-construction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-construction_dev}
      POSTGRES_DB: ${POSTGRES_DB:-construction_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-construction} -d ${POSTGRES_DB:-construction_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-construction_db}
      DATABASE_USER: ${POSTGRES_USER:-construction}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-construction_dev}
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
      MEDIA_URL: ${MEDIA_URL:-/media/}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      if [ ! -f manage.py ]; then
        echo '[backend] Add a Django project (manage.py) under ./backend, then restart this service.';
        sleep infinity;
      else
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000;
      fi
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    command: >
      sh -c "
      if [ ! -f package.json ]; then
        echo '[frontend] Add a Next.js app under ./frontend, then restart this service.';
        sleep infinity;
      else
        npm install &&
        npm run dev;
      fi
      "

  # VS Code / Cursor attaches here: prebuilt Node image + Python feature only (no Docker-in-Docker).
  # DATABASE_* so Django tasks in the IDE resolve Postgres at hostname `db`, not localhost.
  devcontainer:
    image: mcr.microsoft.com/devcontainers/javascript-node:20-bookworm
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-construction_db}
      DATABASE_USER: ${POSTGRES_USER:-construction}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-construction_dev}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  backend_media:
  frontend_node_modules:
  frontend_next:
